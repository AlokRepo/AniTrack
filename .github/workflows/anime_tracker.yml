name: Aniverse Airing Tracker

on:
  schedule:
    # Runs automatically every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      test:
        description: 'Send a test notification to verify Discord webhook setup'
        required: false
        type: boolean
        default: false

jobs:
  check-schedule:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v6

      - name: Set up Python Environment
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Check Webhook Secret Presence
        run: |
          if [ -z "${{ secrets.DISCORD_WEBHOOK_URL }}" ]; then
            echo "::error::DISCORD_WEBHOOK_URL secret is empty or not set in Repository Secrets! Please make sure it is configured under Settings > Secrets and variables > Actions > Repository secrets."
            exit 1
          fi

      - name: Execute Tracker Script
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ "${{ github.event.inputs.test }}" = "true" ]; then
            python check_schedule.py --test
          else
            python check_schedule.py
          fi

      - name: Commit and push sent alerts cache
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain sent_alerts.json)" ]; then
            git add sent_alerts.json
            git commit -m "chore: Update sent alerts cache [skip ci]"
            git push
          else
            echo "No changes to sent alerts cache."
          fi
